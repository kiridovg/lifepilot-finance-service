syntax = "proto3";

package finance.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/kiridovg/lifepilot-finance-service/gen/finance/v1;financev1";

message Expense {
  int32 id = 1;
  string description = 2;
  string amount = 3;
  string currency = 4;
  optional string charged_amount = 5;
  optional string charged_currency = 6;
  string payment_method = 7;
  optional string category = 8;
  optional int32 transfer_id = 9;
  google.protobuf.Timestamp date = 10;
  google.protobuf.Timestamp created_at = 11;
}

message ListExpensesRequest {
  optional string currency = 1;
  optional string payment_method = 2;
  optional string category = 3;
  optional google.protobuf.Timestamp date_from = 4;
  optional google.protobuf.Timestamp date_to = 5;
}

message ListExpensesResponse {
  repeated Expense expenses = 1;
}

message CreateExpenseRequest {
  string description = 1;
  string amount = 2;
  string currency = 3;
  optional string charged_amount = 4;
  optional string charged_currency = 5;
  string payment_method = 6;
  optional string category = 7;
  google.protobuf.Timestamp date = 8;
}

message CreateExpenseResponse {
  Expense expense = 1;
}

message UpdateExpenseRequest {
  int32 id = 1;
  optional string description = 2;
  optional string amount = 3;
  optional string currency = 4;
  optional string charged_amount = 5;
  optional string charged_currency = 6;
  optional string payment_method = 7;
  optional string category = 8;
  optional google.protobuf.Timestamp date = 9;
}

message UpdateExpenseResponse {
  Expense expense = 1;
}

message DeleteExpenseRequest {
  int32 id = 1;
}

message DeleteExpenseResponse {}

service ExpenseService {
  rpc ListExpenses(ListExpensesRequest) returns (ListExpensesResponse);
  rpc CreateExpense(CreateExpenseRequest) returns (CreateExpenseResponse);
  rpc UpdateExpense(UpdateExpenseRequest) returns (UpdateExpenseResponse);
  rpc DeleteExpense(DeleteExpenseRequest) returns (DeleteExpenseResponse);
}
