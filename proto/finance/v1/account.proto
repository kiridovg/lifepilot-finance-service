syntax = "proto3";

package finance.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/kiridovg/lifepilot-finance-service/gen/finance/v1;financev1";

message Account {
  int32 id = 1;
  string name = 2;
  string currency = 3;
  optional string payment_method_code = 4;
  string initial_balance = 5;
  string initial_date = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  // computed fields
  double balance = 9;
  double total_expenses = 10;
  double transfers_out = 11;
  double transfers_in = 12;
}

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

message CreateAccountRequest {
  string name = 1;
  string currency = 2;
  optional string payment_method_code = 3;
  double initial_balance = 4;
  string initial_date = 5;
}

message CreateAccountResponse {
  Account account = 1;
}

message UpdateAccountRequest {
  int32 id = 1;
  optional string name = 2;
  optional double initial_balance = 3;
  optional string initial_date = 4;
}

message UpdateAccountResponse {
  Account account = 1;
}

message DeleteAccountRequest {
  int32 id = 1;
}

message DeleteAccountResponse {}

service AccountService {
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}
